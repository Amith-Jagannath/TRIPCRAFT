services:
  - type: web
    name: tripcraft-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GEMINI_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: sky-scrapper.p.rapidapi.com
      - key: MOCK_MODE
        value: "true"
      - key: CHROMA_DB_PATH
        value: ./data/chroma_store
